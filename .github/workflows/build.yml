name: Build

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: windows/go.sum

      - name: Tidy and download dependencies
        run: |
          cd windows
          go mod tidy
          go mod download

      - name: Test
        run: |
          cd windows
          go test ./...

      - name: Build
        env:
          CGO_ENABLED: 0
        run: |
          cd windows
          New-Item -ItemType Directory -Force -Path ..\dist | Out-Null
          go build -ldflags "-H windowsgui -s -w" -o ..\dist\Hotfix.exe .

      - name: Upload artifact (all runs)
        uses: actions/upload-artifact@v7
        with:
          name: Hotfix-Windows
          path: dist/Hotfix.exe

      - name: Prepare versioned release asset
        if: github.event_name == 'release'
        run: Copy-Item dist/Hotfix.exe "dist/Hotfix-${{ github.event.release.tag_name }}-Windows.exe"

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/Hotfix.exe
            dist/Hotfix-${{ github.event.release.tag_name }}-Windows.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install librsvg (for icon generation)
        run: brew install librsvg

      - name: Test
        run: swift test

      - name: Build DMG
        run: bash scripts/build.sh

      - name: Upload artifact (all runs)
        uses: actions/upload-artifact@v7
        with:
          name: Hotfix-macOS
          path: dist/Hotfix.dmg

      - name: Prepare versioned release asset
        if: github.event_name == 'release'
        run: cp dist/Hotfix.dmg "dist/Hotfix-${{ github.event.release.tag_name }}-macOS.dmg"

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/Hotfix.dmg
            dist/Hotfix-${{ github.event.release.tag_name }}-macOS.dmg

  # On every release, rewrite the site's download buttons to the new
  # version+OS-named assets and push the change back to main (GitHub Pages
  # serves docs/ from main). Keeps docs/index.html links from going stale.
  update-site:
    needs: [build-windows, build-macos]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Bump download links to ${{ github.event.release.tag_name }}
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          sed -i -E \
            -e "s#Hotfix-v[0-9]+\.[0-9]+\.[0-9]+-macOS\.dmg#Hotfix-${TAG}-macOS.dmg#g" \
            -e "s#Hotfix-v[0-9]+\.[0-9]+\.[0-9]+-Windows\.exe#Hotfix-${TAG}-Windows.exe#g" \
            docs/index.html

      - name: Commit and push if changed
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if git diff --quiet -- docs/index.html; then
            echo "Download links already point to ${TAG}; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "site: bump download links to ${TAG} [skip ci]"
          git push origin main
