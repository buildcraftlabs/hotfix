name: Build

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Tidy and download dependencies
        run: |
          cd windows
          go mod tidy
          go mod download

      - name: Test
        run: |
          cd windows
          go test ./...

      - name: Build
        env:
          CGO_ENABLED: 0
        run: |
          cd windows
          New-Item -ItemType Directory -Force -Path ..\dist | Out-Null
          go build -ldflags "-H windowsgui -s -w" -o ..\dist\Hotfix.exe .

      - name: Upload artifact (all runs)
        uses: actions/upload-artifact@v4
        with:
          name: Hotfix-Windows
          path: dist/Hotfix.exe

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Hotfix.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install librsvg (for icon generation)
        run: brew install librsvg

      - name: Test
        run: swift test

      - name: Build DMG
        run: bash scripts/build.sh

      - name: Upload artifact (all runs)
        uses: actions/upload-artifact@v4
        with:
          name: Hotfix-macOS
          path: dist/Hotfix.dmg

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Hotfix.dmg
